<div [ngClass]="{ 'highlight': isHighlighted }"
  [ngStyle]="{ border: isHighlighted ? '2px solid blue' : '1px solid gray' }">
  <h3>{{ post.title }}</h3>
  <p>{{ post.body }}</p>

  <button (click)="toggleHighlight()">
    Toggle Highlight
  </button>

  <!-- Debug -->
  <pre>{{ post | json }}</pre>
</div>
